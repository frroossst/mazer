<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mazer wasm demo</title>
    <style>
      /* This is YOUR wrapper: your fonts, your layout, your chrome.
         mazer only fills in the content of the [data-mazer] blocks below. */
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.6;
        color: #1a1a1a;
      }
      header {
        border-bottom: 2px solid #eee;
        margin-bottom: 2rem;
      }
      .note {
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 0 1.25rem;
        margin: 1.5rem 0;
      }
      pre {
        background: #f6f8fa;
        padding: 0.75rem;
        border-radius: 6px;
        overflow-x: auto;
      }
      .mazer-error {
        color: #b00020;
        background: #fff0f0;
      }
      footer {
        margin-top: 3rem;
        color: #888;
        font-size: 0.9rem;
      }
    </style>
    <!-- One line wires up everything. Load the auto-loader as a module. -->
    <script type="module" src="./mazer.js"></script>
  </head>
  <body>
    <header>
      <h1>My Blog</h1>
      <p>Notes written in <code>.zr</code>, rendered in the browser by mazer.</p>
    </header>

    <main>
      <!-- Each block points at a real .zr file. The loader fetches it,
           compiles it with the wasm module, and replaces the contents. -->
      <article class="note">
        <div data-mazer="./demo/note.zr">Loading note…</div>
      </article>

      <article class="note">
        <div data-mazer="./demo/about.zr">Loading note…</div>
      </article>
    </main>

    <footer>
      <p>Served over http — try <code>python3 -m http.server</code> in this folder.</p>
    </footer>
  </body>
</html>
