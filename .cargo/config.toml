[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=--ld-path=wild"]

# wasm uses rust-lld, which rejects the host's `-fuse-ld=lld`. Giving the wasm
# target its own rustflags stops it from inheriting the `[build]` flags below.
[target.wasm32-unknown-unknown]
rustflags = ["-Zthreads=22"]

[gc.auto]
frequency = "never"

[build]
rustflags = ["-Zthreads=22", "-Clink-arg=-fuse-ld=lld"]

